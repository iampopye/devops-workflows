name: Reusable Compliance Validation (HIPAA/GDPR)

on:
  workflow_call:
    inputs:
      policy_path:
        required: false
        type: string
        default: policy/
      trivy_severity:
        required: false
        type: string
        default: HIGH,CRITICAL

permissions:
  contents: read
  security-events: write

jobs:
  compliance-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy config scan for IaC misconfig
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          severity: ${{ inputs.trivy_severity }}
          exit-code: 1

      - name: Upload config SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-config.sarif

      - name: Validate OPA policies
        uses: open-policy-agent/setup-opa@v2

      - name: Run policy checks
        run: |
          if [ -d "${{ inputs.policy_path }}" ]; then
            opa test "${{ inputs.policy_path }}" -v
          else
            echo "No policy directory found at ${{ inputs.policy_path }}; skipping OPA tests."
          fi

      - name: Compliance checklist summary
        run: |
          {
            echo "## Compliance coverage (baseline)"
            echo "- ✅ Vulnerability and IaC misconfiguration scanning"
            echo "- ✅ Secret detection (recommend paired security workflow)"
            echo "- ✅ Policy-as-code validation support"
            echo "- ℹ️ Map controls to HIPAA Security Rule and GDPR Article 32 in your org docs"
          } >> "$GITHUB_STEP_SUMMARY"
