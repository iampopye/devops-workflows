name: Reusable AI-Assisted PR Review

on:
  workflow_call:
    inputs:
      model:
        required: false
        type: string
        default: gpt-4o-mini
      max_changed_files:
        required: false
        type: number
        default: 100
    secrets:
      openai_api_key:
        required: true

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ai-pr-review-${{ github.repository }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  ai-pr-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Build PR patch summary
        id: diff
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            const perPage = Number('${{ inputs.max_changed_files }}') || 100;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: Math.min(perPage, 100)
            });

            const compact = files.slice(0, perPage).map(f => ({
              filename: f.filename,
              status: f.status,
              additions: f.additions,
              deletions: f.deletions,
              patch: (f.patch || '').slice(0, 3000)
            }));

            const payload = JSON.stringify(compact, null, 2);
            core.setOutput('diff', payload.slice(0, 50000));

      - name: AI review comment
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.openai_api_key }}
          MODEL: ${{ inputs.model }}
          DIFF_TEXT: ${{ steps.diff.outputs.diff }}
        with:
          github-token: ${{ github.token }}
          script: |
            const prompt = `Review this pull request patch summary with focus on security, reliability, and maintainability. Return concise findings, risk level, and concrete recommendations.\n\n${process.env.DIFF_TEXT}`;
            const res = await fetch('https://api.openai.com/v1/chat/completions', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                model: process.env.MODEL,
                messages: [
                  { role: 'system', content: 'You are a senior DevSecOps reviewer.' },
                  { role: 'user', content: prompt }
                ],
                temperature: 0.2
              })
            });

            if (!res.ok) {
              const body = await res.text();
              core.setFailed(`OpenAI API error (${res.status}): ${body}`);
              return;
            }

            const data = await res.json();
            const review = data.choices?.[0]?.message?.content || 'AI review unavailable.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 AI PR Review\n\n${review}`,
            });
