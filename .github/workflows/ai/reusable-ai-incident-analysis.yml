name: Reusable AI Incident Analysis

on:
  workflow_call:
    inputs:
      model:
        required: false
        type: string
        default: gpt-4o-mini
      incident_context:
        required: false
        type: string
        default: ""
      max_failed_runs:
        required: false
        type: number
        default: 5
    secrets:
      openai_api_key:
        required: true

permissions:
  actions: read
  contents: read
  issues: write

concurrency:
  group: ai-incident-analysis-${{ github.repository }}
  cancel-in-progress: false

jobs:
  incident-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Analyze failed runs with AI
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.openai_api_key }}
          MODEL: ${{ inputs.model }}
          INCIDENT_CONTEXT: ${{ inputs.incident_context }}
          MAX_FAILED_RUNS: ${{ inputs.max_failed_runs }}
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const maxRuns = Number(process.env.MAX_FAILED_RUNS || '5');
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              per_page: 30,
              status: 'completed'
            });

            const failures = runs.data.workflow_runs
              .filter(r => r.conclusion === 'failure')
              .slice(0, maxRuns)
              .map(r => ({
                name: r.name,
                run_number: r.run_number,
                url: r.html_url,
                conclusion: r.conclusion,
                created_at: r.created_at
              }));

            if (failures.length === 0) {
              core.info('No recent failed workflow runs found; skipping issue creation.');
              return;
            }

            const prompt = `Analyze these recent CI/CD failures and produce: probable root cause, blast radius, immediate mitigations, and prevention steps.\n\nFailures: ${JSON.stringify(failures, null, 2)}\n\nContext: ${process.env.INCIDENT_CONTEXT}`;
            const aiResp = await fetch('https://api.openai.com/v1/chat/completions', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                model: process.env.MODEL,
                messages: [
                  { role: 'system', content: 'You are an SRE incident commander assistant.' },
                  { role: 'user', content: prompt }
                ],
                temperature: 0.1
              })
            });

            if (!aiResp.ok) {
              const body = await aiResp.text();
              core.setFailed(`OpenAI API error (${aiResp.status}): ${body}`);
              return;
            }

            const aiData = await aiResp.json();
            const analysis = aiData.choices?.[0]?.message?.content || 'Analysis unavailable.';
            await github.rest.issues.create({
              owner,
              repo,
              title: `AI Incident Analysis - ${new Date().toISOString().slice(0, 10)}`,
              body: `## Automated Incident Analysis\n\n${analysis}`
            });
